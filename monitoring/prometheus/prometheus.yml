global:
  scrape_interval: 5s
  evaluation_interval: 5s
  scrape_timeout: 4s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: fastapi
    metrics_path: /metrics/
    static_configs:
      # Preferred target for Docker on Linux/macOS/Windows when extra_hosts host-gateway is set.
      - targets: ["host.docker.internal:8000"]

      # Optional fallback if running Prometheus in host network mode (disabled by default).
      # - targets: ["localhost:8000"]