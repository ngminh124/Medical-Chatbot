services:
  # --- Vector Database ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: medical_qdrant
    ports:
      - "6333:6333"
    volumes:
      - ../qdrant_data:/qdrant/storage
    restart: always
    networks:
      - medical_network

  # --- Full-text Search Engine ---
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: medical_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g" # Tăng lên 1GB nếu dữ liệu y tế lớn, hoặc giữ 512m nếu muốn tiết kiệm RAM
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    restart: always
    networks:
      - medical_network
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 5

networks:
  medical_network:
    driver: bridge

volumes:
  elasticsearch_data:
    driver: local