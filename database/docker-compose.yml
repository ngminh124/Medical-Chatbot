services:
  postgres_db:
    image: postgres:18-bookworm
    container_name: postgres_db
    restart: always
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - medical_rag_network

volumes:
  postgres_data:

networks:
  medical_rag_network:
    external: true